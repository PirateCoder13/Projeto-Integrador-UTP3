<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Servidor Minecraft</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000000;
            color: #ecf0f1;
            margin: 0;
            padding: 0;
        }
        .dashboard {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #34495e;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .dashboard h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background-color: #000000;
            border-radius: 5px;
        }
        .info span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Dashboard do Servidor Minecraft</h1>
        <div class="info">
            <span>CPU:</span>
            <span>50% (2 cores)</span>
        </div>
        <div class="info">
            <span>RAM:</span>
            <span>8GB (4GB alocado)</span>
        </div>
        <div class="info">
            <span>DISCO:</span>
            <span>100GB (50GB usados)</span>
        </div>
        <div class="info">
            <span>JOGADORES:</span>
            <span>10/20 (10 jogadores online)</span>
        </div>
        <div class="info">
            <span>TEMPO DE JOGO:</span>
            <span>5 dias, 3 horas, 15 minutos</span>
        </div>
        <div class="info">
            <span>UPTIME:</span>
            <span>10 dias, 2 horas, 30 minutos</span>
        </div>
        <div class="info">
            <span>VERSÃO:</span>
            <span>1.20.2</span>
        </div>
        <div class="info">
            <span>MODS:</span>
            <span>5 mods instalados</span>
        </div>
        <div class="info">
            <span>PLUGINS:</span>
            <span>3 plugins instalados</span>
        </div>
    </div>
</body>
</html>
